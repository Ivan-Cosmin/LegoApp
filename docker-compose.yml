version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lego_postgres_vector
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1q2w3e
      - POSTGRES_DB=lego_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: