spring.application.name=LegoAssistant
server.port=${PORT:8080}

# ===============================
# 1. DATABASE SETUP (PostgreSQL)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lego_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1q2w3e}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# 2. OPENROUTER SETUP (Pentru Chatbot)
# ===============================
# Cheia ta de la OpenRouter
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api
# Poti folosi orice model de pe OpenRouter (am pus gemini flash pentru ca este super rapid si ieftin/gratuit pe OpenRouter)
spring.ai.openai.chat.options.model=${OPENROUTER_MODEL:nex-agi/nex-n2-pro:free}

# DEZACTIVAM generarea de vectori cu OpenAI/OpenRouter, pentru ca vom face asta local, gratis!
spring.ai.openai.embedding.enabled=false

# ===============================
# 3. AI MEMORY (Local Embeddings + PGVector)
# ===============================
spring.ai.vectorstore.pgvector.initialize-schema=true
# Dimensiunea 384 pentru modelul local all-MiniLM-L6-v2
spring.ai.vectorstore.pgvector.dimensions=384
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# ===============================
# 4. FILE UPLOADS
# ===============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
lego.storage.type=${LEGO_STORAGE_TYPE:local}
lego.storage.s3.bucket=${S3_BUCKET_NAME:}
lego.storage.local.dir=${LEGO_LOCAL_STORAGE_DIR:./uploads}

# ===============================
# 5. ACTUATOR HEALTH CHECKS
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true