<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upload New Set</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">📂 Upload New Lego Manual</h4>
                </div>
                <div class="card-body">
                    <!-- ENCTYPE is crucial for file uploads -->
                    <form th:action="@{/upload}" method="post" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label">Set Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Ex: Death Star" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Set Number</label>
                            <input type="number" name="setNumber" class="form-control" placeholder="10188" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Theme</label>
                            <input type="text" name="theme" class="form-control" placeholder="Ex: Star Wars" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Manual File (PDF/Text)</label>
                            <input type="file" name="file" class="form-control" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Upload & Index</button>
                            <a href="/" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
