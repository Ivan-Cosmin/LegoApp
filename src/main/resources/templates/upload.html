<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <title>Upload New Set</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-light app-vh">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <a href="/" class="btn btn-outline-secondary btn-sm">&larr; Back</a>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                </form>
            </div>

            <div class="card shadow-sm overflow-hidden">
                <div class="card-header text-white"
                     style="background: linear-gradient(135deg, #16a34a, #22c55e);">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <h4 class="mb-0">📂 Upload New Manual</h4>
                            <div class="small opacity-75">PDF or text file • we’ll index it for the AI</div>
                        </div>
                    </div>
                </div>
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <!-- ENCTYPE is crucial for file uploads -->
                    <form th:action="@{/upload}" th:object="${upload}" method="post" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label" for="name">Set Name</label>
                            <input id="name" type="text" th:field="*{name}" class="form-control"
                                   placeholder="Ex: Death Star" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}"></div>
                        </div>

                        <div class="row g-2">
                            <div class="col-12 col-md-6">
                                <div class="mb-3">
                                    <label class="form-label" for="setNumber">Set Number</label>
                                    <input id="setNumber" type="number" th:field="*{setNumber}" class="form-control"
                                           placeholder="10188" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('setNumber')}"
                                         th:errors="*{setNumber}"></div>
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <div class="mb-3">
                                    <label class="form-label" for="theme">Theme</label>
                                    <input id="theme" type="text" th:field="*{theme}" class="form-control"
                                           placeholder="Ex: Star Wars" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('theme')}"
                                         th:errors="*{theme}"></div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="file">Manual File</label>
                            <input id="file" type="file" th:field="*{file}" class="form-control" required>
                            <div class="form-text">Allowed: PDF or text. Max size: 20MB.</div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('file')}"
                                 th:errors="*{file}"></div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Upload & Index</button>
                            <a href="/" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
