<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <title th:text="${legoSet.name} + ' - Assistant'">Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        /* Page fills viewport; chat area takes remaining space */
        .chat-page {
            min-height: var(--app-vh);
        }
        .chat-scroll {
            flex: 1 1 auto;
            min-height: 0;
            max-height: none;
        }
        @media (max-width: 767.98px) {
            .border-start { border-left: none !important; border-top: 1px solid #dee2e6 !important; }
        }
    </style>
</head>
<body class="bg-light app-vh">

<div class="container-fluid chat-page d-flex flex-column p-0">

    <!-- Top bar -->
    <div class="bg-white border-bottom">
        <div class="container-fluid py-3 px-4 d-flex align-items-center justify-content-between gap-2">
            <div class="d-flex align-items-center gap-2">
                <a href="/" class="btn btn-outline-secondary btn-sm">&larr; Back</a>
                <div>
                    <div class="fw-semibold" th:text="${legoSet.name}">Set Name</div>
                    <div class="text-muted small">
                        <span th:text="${legoSet.theme}">Theme</span>
                        <span class="mx-1">•</span>
                        <span>#<span th:text="${legoSet.setNumber}">0000</span></span>
                    </div>
                </div>
            </div>

            <div class="d-flex align-items-center gap-2">
                <form th:action="@{/set/{id}/chat/clear(id=${legoSet.id})}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-secondary btn-sm">Clear chat</button>
                </form>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Chat area -->
    <div class="container-fluid flex-grow-1 d-flex flex-column p-4" style="min-height:0;">

        <div th:if="${message}" class="alert alert-success mb-3" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>

        <div id="chatBox" class="chat-scroll pe-1">
            <div th:if="${#lists.isEmpty(chatHistory)}" class="text-muted small">
                No messages yet. Ask your first question below.
            </div>

            <div th:each="msg : ${chatHistory}" class="card shadow-sm mb-2 chat-msg">
                <div class="card-body">
                    <div class="small text-muted" th:text="${msg.timestamp}">time</div>
                    <div class="mt-2">
                        <strong>You:</strong>
                        <div th:text="${msg.userMessage}">...</div>
                    </div>
                    <hr class="my-2" />
                    <div>
                        <strong>AI:</strong>
                        <div th:text="${msg.aiResponse}">...</div>
                    </div>
                </div>
            </div>

            <div id="chatBottom"></div>
        </div>

        <!-- Input footer (stays at bottom) -->
        <div class="pt-3">
            <form th:action="@{/set/{id}/ask(id=${legoSet.id})}" method="post" autocomplete="off">
                <div class="row g-2 mb-2">
                    <div class="col-6 col-md-3">
                        <label for="tone" class="form-label small mb-1">Tone</label>
                        <select id="tone" name="tone" class="form-select form-select-sm">
                            <option value="friendly" th:selected="${selectedTone} == 'friendly'">Friendly</option>
                            <option value="concise" th:selected="${selectedTone} == 'concise'">Concise</option>
                            <option value="detailed" th:selected="${selectedTone} == 'detailed'">Detailed</option>
                        </select>
                    </div>
                    <div class="col-6 col-md-3">
                        <label for="role" class="form-label small mb-1">Role</label>
                        <select id="role" name="role" class="form-select form-select-sm">
                            <option value="assistant" th:selected="${selectedRole} == 'assistant'">General helper</option>
                            <option value="teacher" th:selected="${selectedRole} == 'teacher'">Step-by-step teacher</option>
                            <option value="inspector" th:selected="${selectedRole} == 'inspector'">Mistake checker</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="question" class="visually-hidden">Question</label>
                    <input id="question" type="text" name="question" class="form-control" placeholder="Ask anything about this manual..." required>
                    <button class="btn btn-primary" type="submit">Send</button>
                </div>
            </form>
        </div>

    </div>

</div>

<script>
    (function () {
        var chatBox = document.getElementById('chatBox');
        if (chatBox) {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        var input = document.getElementById('question');
        if (input) {
            input.focus();
        }
    })();
</script>

</body>
</html>
