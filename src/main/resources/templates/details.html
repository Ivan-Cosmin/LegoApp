<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Building Mode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="height: 100vh; overflow: hidden;">

<div class="container-fluid h-100">
    <div class="row h-100">

        <!-- LEFT: Instructions -->
        <div class="col-md-8 p-4 overflow-auto bg-white">
            <a href="/" class="btn btn-outline-secondary mb-3">&larr; Back</a>
            <h2 th:text="${legoSet.name}">Set Name</h2>
            <hr>

            <div th:each="step : ${legoSet.steps}" class="card mb-3">
                <div class="card-body">
                    <h5 class="card-title">Step <span th:text="${step.stepNumber}">1</span></h5>
                    <p class="card-text lead" th:text="${step.instructionText}">Do this...</p>
                </div>
            </div>
        </div>

        <!-- RIGHT: AI Assistant -->
        <div class="col-md-4 bg-light border-start p-4 d-flex flex-column">
            <h4>🤖 AI Assistant</h4>
            <p class="text-muted small">Ask questions about this set!</p>

            <!-- AI Response Box -->
            <div th:if="${aiResponse}" class="alert alert-success mt-3 shadow-sm">
                <strong>You:</strong> <span th:text="${lastQuestion}">...</span><br>
                <hr>
                <strong>AI:</strong> <span th:text="${aiResponse}">...</span>
            </div>

            <div class="mt-auto">
                <form th:action="@{/set/{id}/ask(id=${legoSet.id})}" method="post">
                    <div class="input-group">
                        <input type="text" name="question" class="form-control" placeholder="Ex: What is step 1?" required>
                        <button class="btn btn-primary" type="submit">Ask</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
