<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lego Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-light app-vh">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container d-flex align-items-center justify-content-between">
        <div class="d-flex flex-column">
            <span class="navbar-brand h1 mb-0">🧱 LEGO Builder Assistant</span>
            <span class="text-white-50 small">Search manuals, chat with AI, keep history</span>
        </div>

        <div class="d-flex align-items-center gap-2">
            <a href="/upload" class="btn btn-success btn-sm">+ Add Set</a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex flex-column flex-sm-row align-items-sm-center justify-content-between gap-2 mb-3">
        <div>
            <h2 class="mb-0">Your Collection</h2>
            <p class="text-muted mb-0">Pick a set to enter building mode.</p>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(legoSets)}" class="card shadow-sm">
        <div class="card-body p-4">
            <h5 class="mb-1">No sets yet</h5>
            <p class="text-muted mb-3">Upload your first manual and start chatting with the assistant.</p>
            <a href="/upload" class="btn btn-success">Upload a manual</a>
        </div>
    </div>

    <div class="row g-3" th:if="${!#lists.isEmpty(legoSets)}">
        <div class="col-12 col-sm-6 col-lg-4" th:each="set : ${legoSets}">
            <div class="card shadow-sm set-card">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex align-items-start justify-content-between gap-2">
                        <div>
                            <h5 class="card-title mb-1" th:text="${set.name}">Name</h5>
                            <div class="text-muted small">
                                <span th:text="${set.theme}">Theme</span>
                                <span class="mx-1">•</span>
                                <span>#<span th:text="${set.setNumber}">0000</span></span>
                            </div>
                        </div>
                    </div>

                    <p class="card-text mt-3 mb-4" th:text="${set.description}">Description</p>

                    <div class="mt-auto">
                        <a th:href="@{/set/{id}(id=${set.id})}" class="btn btn-primary w-100">Start Building</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
