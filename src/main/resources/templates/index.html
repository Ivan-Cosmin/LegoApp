<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lego Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand h1 mb-0">🧱 LEGO Builder Assistant</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-12 mb-4">
            <h2>Your Collection</h2>
        </div>
    </div>

    <div class="row">
        <!-- Loop through Lego Sets -->
        <div class="col-md-4" th:each="set : ${legoSets}">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${set.name}">Name</h5>
                    <h6 class="card-subtitle mb-2 text-muted" th:text="${set.theme}">Theme</h6>
                    <p class="card-text" th:text="${set.description}">Description</p>
                    <a th:href="@{/set/{id}(id=${set.id})}" class="btn btn-primary">Start Building</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
