<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lego Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-light app-vh">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">
            <div class="card shadow-sm overflow-hidden">
                <div class="card-header text-white text-center"
                     style="background: linear-gradient(135deg, #0055bf, #2563eb);">
                    <div class="py-1">
                        <div class="fw-semibold" style="letter-spacing:.3px;">🧱 LEGO Assistant</div>
                        <div class="small opacity-75">Build smarter, not harder</div>
                    </div>
                </div>
                <div class="card-body p-4">
                    <h5 class="text-center mb-4">Sign in</h5>

                    <div th:if="${param.error}" class="alert alert-danger">
                        Invalid username or password.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        You have been logged out.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Sign In</button>
                        </div>
                        <p class="text-center text-muted small mt-3 mb-0">
                            Tip: use your saved admin/user credentials.
                        </p>
                    </form>
                </div>
            </div>

            <div class="text-center text-muted small mt-3">
                © <span th:text="${T(java.time.Year).now()}">2026</span> LEGOAssistant
            </div>
        </div>
    </div>
</div>
</body>
</html>
